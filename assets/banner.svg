<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dark background base -->
    <rect id="bg" width="1200" height="320" fill="#0a0a0f"/>
    
    <!-- Terminal grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1a1a2e" stroke-width="0.5"/>
    </pattern>
    
    <!-- Diagonal accent lines -->
    <pattern id="diagonal" width="100" height="100" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="100" stroke="#7c3aed" stroke-width="0.3" opacity="0.1"/>
    </pattern>
    
    <!-- Purple-violet gradient -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#a78bfa;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c4b5fd;stop-opacity:0.6"/>
    </linearGradient>
    
    <!-- Glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    
    <!-- Subtle noise texture -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.03"/>
      </feComponentTransfer>
    </filter>
  </defs>
  
  <!-- Background layers -->
  <rect width="1200" height="320" fill="#0a0a0f"/>
  <rect width="1200" height="320" fill="url(#grid)"/>
  <rect width="1200" height="320" fill="url(#diagonal)"/>
  <rect width="1200" height="320" filter="url(#noise)" opacity="0.5"/>
  
  <!-- Left accent bar -->
  <rect x="50" y="60" width="4" height="200" fill="url(#accentGradient)" rx="2"/>
  
  <!-- Decorative corner elements -->
  <g opacity="0.4">
    <rect x="1100" y="50" width="30" height="30" fill="none" stroke="#8b5cf6" stroke-width="1"/>
    <rect x="1105" y="55" width="20" height="20" fill="none" stroke="#a78bfa" stroke-width="0.5"/>
  </g>
  
  <!-- Bottom right decorative line -->
  <line x1="900" y1="280" x2="1140" y2="280" stroke="#8b5cf6" stroke-width="1" opacity="0.3"/>
  <circle cx="1140" cy="280" r="4" fill="#8b5cf6" opacity="0.5"/>
  
  <!-- Main title with glow -->
  <text x="90" y="140" 
        font-family="JetBrains Mono, Fira Code, SF Mono, monospace"
        font-size="64"
        fill="#f0f0f5"
        font-weight="600"
        letter-spacing="-0.03em"
        filter="url(#glow)">
    icedeyes12
  </text>
  
  <!-- Subtitle -->
  <text x="90" y="190"
        font-family="JetBrains Mono, Fira Code, monospace"
        font-size="18"
        fill="#6b7280"
        letter-spacing="0.08em">
    systems · agents · infrastructure
  </text>
  
  <!-- Terminal-style path indicator -->
  <text x="90" y="250"
        font-family="JetBrains Mono, monospace"
        font-size="13"
        fill="#8b5cf6"
        opacity="0.8">
    ~/dev/experiments
  </text>
  
  <!-- Status indicators -->
  <g transform="translate(90, 270)">
    <circle cx="0" cy="0" r="4" fill="#22c55e"/>
    <text x="12" y="4"
          font-family="JetBrains Mono, monospace"
          font-size="11"
          fill="#4b5563">
      tinkering
    </text>
  </g>
  
  <!-- Floating geometric shapes on right -->
  <g opacity="0.15" transform="translate(950, 100)">
    <polygon points="100,0 120,40 80,40" fill="#8b5cf6"/>
    <rect x="140" y="60" width="25" height="25" fill="#a78bfa" transform="rotate(15 152 72)"/>
    <circle cx="80" cy="120" r="15" fill="#c4b5fd"/>
  </g>
</svg>